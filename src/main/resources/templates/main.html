<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<div layout:fragment="content" class="container my-3">
    <table class="table">
        <thead class="table-dark">
        <tr class="text-center">
            <th>번호</th>
            <th style="width:50%">제목</th>
            <th>글쓴이</th>
            <th>작성일시</th>
        </tr>
        </thead>
        <tbody class="text-center" id="table_body">

        </tbody>
    </table>

    <div id="pagination" class="pagination justify-content-center">
        <ul class="pagination justify-content-center"></ul>
    </div>
</div>

<script layout:fragment="script" type="text/javascript">

    // 페이지 로드 초기화
    $(document).ready(function () {
        let currentPage = 0;

        lodeData(currentPage);

        // 이전 페이지 버튼 클릭 시
        $("#prev_button").click(function (currentPage) {
            if (currentPage > 1) {
                currentPage--;
                console.log("prev_button", currentPage);
                dataList(currentPage);
            }
        });

        // 다음 페이지 버튼 클릭 시
        $("#next_button").click(function (currentPage) {
            currentPage++;
            console.log("next_button", currentPage);
            dataList(currentPage);
        });
    });

    // 데이터 요청 및 페이지에 추가
    function lodeData(pageNum) {
        console.log("pageNum1", pageNum);
        // let pageNum = page - 1;
        //데이터 요청
        $.ajax({
            url: "/question/list?page=" + pageNum,
            method: "GET",
            contentType: 'application/json',
            success: function (data) {
                console.log(data);
                // console.log("pageable", data.pageable);

                //데이터 테이블에(화면) 표시
                dataList(data.content);

                //페이지네이션 컨트롤러 생성, 업데이트
                pagination(data.totalPages, pageNum);
            },
            error: function (error) {
                console.log(error)
            }
        });
    }

    // 테이블 데이터 리스트
    function dataList(data) {
        $('#table_body').empty();
        $.each(data, function (index, item) {
            // console.log(item);
            // console.log("index", index);

            let row = '<tr>' +
                // '<td>' + (startNumber + index) + '</td>' +
                // '<td>' + (index + 1) + '</td>' +
                '<td>' + item.subject + '</td>' +
                '<td>' + item.author.username + '</td>' +
                '<td>' + (item.createDate) + '</td>' +
                '</tr>';
            $('#table_body').append(row);
        });
    }

    //페이지네이션 컨트롤러
    function pagination(totalPages, pageNum) {
        let currentPage = pageNum;
        let pagination = $('#pagination ul');
        let startPage = Math.max(0, currentPage - 2);
        let endPage = Math.min(totalPages - 1, startPage + 4);
        pagination.empty();

        pagination.append(
            '<li class="page-item ' + (currentPage === 0 ? 'disabled' : '') + '">' +
            '<a class="page-link" onclick="lodeData(' + (currentPage - 1) + ')" id="prev_button">이전</a></li>');

        for (var page = startPage; page <= endPage; page++) {
            pagination.append('<li class="page-item ' + (page === currentPage ? 'active' : '') + '">' +
                '<a class="page-link" onclick="lodeData(' + page + ')">' + (page + 1) + '</a></li>');
        }

        pagination.append('<li class="page-item ' + (currentPage === totalPages ? 'disabled' : '') + '">' +
            '<a class="page-link" onclick="lodeData(' + (currentPage + 1) + ')" id="next_button">다음</a></li>');
    }
</script>
</html>
